<!DOCTYPE html>
<html>
<head>
    <title>Hover Color</title>
    <style>
        h1 {
            color: black;
            transition: 0.5s;
        }

        h1:hover {
            color: red;
        }

        span {
            transition: 0.5s;
        }

        span:hover {
            color: blue;
        }
    </style>
</head>
<body>

<h1>
    <span>Hello its mee </span>, 
    <span>Welcome</span> 
    <span>to</span> 
    <span>DevOps</span>
</h1>

</body>

</html>
